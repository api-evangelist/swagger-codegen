naftiko: 1.0.0-alpha2
info:
  label: Swagger Generator API — Utilities
  description: 'Swagger Generator API — Utilities. 2 operations. Lead operation: Generate Intermediate Model. Self-contained
    Naftiko capability covering one Swagger Codegen business surface.'
  tags:
  - Swagger Codegen
  - Utilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SWAGGER_CODEGEN_API_KEY: SWAGGER_CODEGEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: swagger-generator-utilities
    baseUri: https://generator3.swagger.io
    description: Swagger Generator API — Utilities business capability. Self-contained, no shared references.
    resources:
    - name: model
      path: /model
      operations:
      - name: generatemodel
        method: POST
        description: Generate Intermediate Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: render
      path: /render
      operations:
      - name: rendertemplate
        method: POST
        description: Render Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: swagger-generator-utilities-rest
    port: 8080
    description: REST adapter for Swagger Generator API — Utilities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/model
      name: model
      description: REST surface for model.
      operations:
      - method: POST
        name: generatemodel
        description: Generate Intermediate Model
        call: swagger-generator-utilities.generatemodel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/render
      name: render
      description: REST surface for render.
      operations:
      - method: POST
        name: rendertemplate
        description: Render Template
        call: swagger-generator-utilities.rendertemplate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: swagger-generator-utilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Swagger Generator API — Utilities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: generate-intermediate-model
      description: Generate Intermediate Model
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: swagger-generator-utilities.generatemodel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: render-template
      description: Render Template
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: swagger-generator-utilities.rendertemplate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
