naftiko: "1.0.0-alpha1"

info:
  label: "Swagger Generator API"
  description: >-
    Online REST API for generating client SDKs, server stubs, and documentation
    from OpenAPI V2 and V3 specifications. Supports 40+ client languages and
    20+ server frameworks via generator3.swagger.io.
  tags:
    - Client Libraries
    - Code Generation
    - Generator
    - OpenAPI
    - SDK
    - Swagger
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SWAGGER_GENERATOR_URL: SWAGGER_GENERATOR_URL

capability:
  consumes:
    - type: http
      namespace: swagger-generator
      baseUri: https://generator3.swagger.io
      description: "Swagger Generator V3 online code generation service"
      resources:
        - name: generation
          path: /generate
          description: "Code generation endpoints"
          operations:
            - name: generate-code
              method: POST
              description: "Generate client SDK or server stub from OpenAPI spec"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  lang: "{{tools.lang}}"
                  type: "{{tools.type}}"
                  codegenVersion: "{{tools.codegenVersion}}"
                  spec: "{{tools.spec}}"

            - name: generate-code-from-url
              method: GET
              description: "Generate code from URL-referenced OpenAPI spec configuration"
              inputParameters:
                - name: codegenOptionsURL
                  in: query
                  type: string
                  required: true
                  description: "URL to a GenerationRequest JSON configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: languages
          path: /{type}/{version}
          description: "Generator language discovery"
          operations:
            - name: list-languages
              method: GET
              description: "List available generator languages by type and version"
              inputParameters:
                - name: type
                  in: path
                  type: string
                  required: true
                  description: "Generator type: client, server, documentation, config"
                - name: version
                  in: path
                  type: string
                  required: true
                  description: "OpenAPI version: V2 or V3"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: options
          path: /options
          description: "Generator language options"
          operations:
            - name: list-options
              method: GET
              description: "Return configurable options for a generator language"
              inputParameters:
                - name: language
                  in: query
                  type: string
                  required: false
                  description: "Generator language identifier"
                - name: version
                  in: query
                  type: string
                  required: false
                  description: "OpenAPI version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: model
          path: /model
          description: "Intermediate model generation"
          operations:
            - name: generate-model
              method: POST
              description: "Generate intermediate bundle/model as JSON for debugging"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  lang: "{{tools.lang}}"
                  spec: "{{tools.spec}}"

  exposes:
    - type: rest
      port: 8100
      namespace: swagger-generator-rest
      resources:
        - path: /v1/generate
          name: generation
          description: "Code generation"
          operations:
            - method: POST
              name: generate-code
              description: "Generate code from OpenAPI spec"
              call: "swagger-generator.generate-code"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/languages/{type}/{version}
          name: languages
          description: "Language discovery"
          operations:
            - method: GET
              name: list-languages
              description: "List available generator languages"
              call: "swagger-generator.list-languages"
              with:
                type: "rest.type"
                version: "rest.version"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/options
          name: options
          description: "Generator options"
          operations:
            - method: GET
              name: list-options
              description: "Get options for a generator language"
              call: "swagger-generator.list-options"
              with:
                language: "rest.language"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/model
          name: model
          description: "Intermediate model"
          operations:
            - method: POST
              name: generate-model
              description: "Generate intermediate model JSON"
              call: "swagger-generator.generate-model"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: swagger-generator-mcp
      transport: http
      tools:
        - name: generate-code
          description: "Generate a client SDK or server stub from an OpenAPI specification"
          hints:
            readOnly: false
            idempotent: false
          call: "swagger-generator.generate-code"
          with:
            lang: "tools.lang"
            type: "tools.type"
            spec: "tools.spec"
          outputParameters:
            - type: object
              mapping: "$."

        - name: generate-code-from-url
          description: "Generate code from an OpenAPI spec referenced by URL"
          hints:
            readOnly: false
            idempotent: false
          call: "swagger-generator.generate-code-from-url"
          with:
            codegenOptionsURL: "tools.codegenOptionsURL"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-languages
          description: "List available Swagger Codegen generator languages for a type and version"
          hints:
            readOnly: true
            idempotent: true
          call: "swagger-generator.list-languages"
          with:
            type: "tools.type"
            version: "tools.version"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-options
          description: "Get configurable generation options for a specific language"
          hints:
            readOnly: true
            idempotent: true
          call: "swagger-generator.list-options"
          with:
            language: "tools.language"
          outputParameters:
            - type: object
              mapping: "$."

        - name: generate-model
          description: "Generate the intermediate bundle model as JSON for debugging"
          hints:
            readOnly: false
            idempotent: false
          call: "swagger-generator.generate-model"
          with:
            lang: "tools.lang"
            spec: "tools.spec"
          outputParameters:
            - type: object
              mapping: "$."
