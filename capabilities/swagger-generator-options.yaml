naftiko: 1.0.0-alpha2
info:
  label: Swagger Generator API — Options
  description: 'Swagger Generator API — Options. 1 operations. Lead operation: List Generator Options. Self-contained Naftiko
    capability covering one Swagger Codegen business surface.'
  tags:
  - Swagger Codegen
  - Options
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SWAGGER_CODEGEN_API_KEY: SWAGGER_CODEGEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: swagger-generator-options
    baseUri: https://generator3.swagger.io
    description: Swagger Generator API — Options business capability. Self-contained, no shared references.
    resources:
    - name: options
      path: /options
      operations:
      - name: listoptions
        method: GET
        description: List Generator Options
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: language
          in: query
          type: string
          description: Generator language identifier (e.g., python, java, typescript-axios)
        - name: version
          in: query
          type: string
          description: OpenAPI version (defaults to V3)
  exposes:
  - type: rest
    namespace: swagger-generator-options-rest
    port: 8080
    description: REST adapter for Swagger Generator API — Options. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/options
      name: options
      description: REST surface for options.
      operations:
      - method: GET
        name: listoptions
        description: List Generator Options
        call: swagger-generator-options.listoptions
        with:
          language: rest.language
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: swagger-generator-options-mcp
    port: 9090
    transport: http
    description: MCP adapter for Swagger Generator API — Options. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-generator-options
      description: List Generator Options
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: swagger-generator-options.listoptions
      with:
        language: tools.language
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
